spring:
  application:
    name: PgVector_mcp
  profiles:
    # 激活的profile (可选: dev模式会插入示例数据)
    active: dev
  
  # WebFlux 服务器配置
  webflux:
    base-path: /
  
  # PostgreSQL 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5434/vectordb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # Spring AI Ollama 配置
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3:0.6b
        temperature: 0.7
      embedding:
        model: qwen3-embedding:0.6b
    
    # PgVector 向量存储配置
    vectorstore:
      pgvector:
        host: localhost
        port: 5434
        database: vectordb
        username: postgres
        password: postgres
        initialize-schema: true
        index-type: hnsw
        dimensions: 1024
        remove-existing-vector-store-table: false
        table-name: test_mcp

# MCP Server 配置
spring.ai.mcp.server:
  name: pgvector-mcp-server
  version: 1.0.0
  type: SYNC
  enabled: true
  protocol: SSE

# 服务器端口配置
server:
  port: 8080